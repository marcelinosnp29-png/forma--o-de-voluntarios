<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - Formulários / Leads | Formação de Voluntários</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --primary: #6c63ff;
    --primary-dark: #5a52d5;
    --primary-light: #ede9ff;
    --success: #22c55e;
    --success-light: #dcfce7;
    --warning: #f59e0b;
    --warning-light: #fef3c7;
    --danger: #ef4444;
    --danger-light: #fee2e2;
    --info: #3b82f6;
    --info-light: #dbeafe;
    --dark: #1e1b4b;
    --gray-50: #f8fafc;
    --gray-100: #f1f5f9;
    --gray-200: #e2e8f0;
    --gray-300: #cbd5e1;
    --gray-400: #94a3b8;
    --gray-500: #64748b;
    --gray-600: #475569;
    --gray-700: #334155;
    --gray-800: #1e293b;
    --sidebar-w: 260px;
    --header-h: 64px;
    --radius: 12px;
    --shadow: 0 1px 3px rgba(0,0,0,.08), 0 4px 16px rgba(0,0,0,.06);
    --shadow-lg: 0 8px 32px rgba(0,0,0,.12);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--gray-50);
    color: var(--gray-800);
    display: flex;
    min-height: 100vh;
  }

  /* ── SIDEBAR ── */
  .sidebar {
    width: var(--sidebar-w);
    background: var(--dark);
    display: flex;
    flex-direction: column;
    position: fixed;
    top: 0; left: 0;
    height: 100vh;
    z-index: 100;
    transition: transform .3s;
  }

  .sidebar-logo {
    padding: 24px 20px 20px;
    border-bottom: 1px solid rgba(255,255,255,.08);
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .sidebar-logo .logo-icon {
    width: 40px; height: 40px;
    background: linear-gradient(135deg, var(--primary), #a78bfa);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }

  .sidebar-logo .logo-text {
    color: #fff;
    font-size: 14px;
    font-weight: 700;
    line-height: 1.3;
  }

  .sidebar-logo .logo-sub {
    color: rgba(255,255,255,.45);
    font-size: 11px;
    font-weight: 400;
  }

  .sidebar-nav {
    flex: 1;
    padding: 16px 12px;
    overflow-y: auto;
  }

  .nav-section {
    margin-bottom: 24px;
  }

  .nav-section-title {
    color: rgba(255,255,255,.35);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    padding: 0 8px;
    margin-bottom: 8px;
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    border-radius: 8px;
    color: rgba(255,255,255,.6);
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
    transition: all .2s;
    cursor: pointer;
    margin-bottom: 2px;
  }

  .nav-item:hover {
    background: rgba(255,255,255,.08);
    color: #fff;
  }

  .nav-item.active {
    background: linear-gradient(135deg, var(--primary), #a78bfa);
    color: #fff;
    box-shadow: 0 4px 12px rgba(108,99,255,.4);
  }

  .nav-item .nav-icon { font-size: 18px; width: 20px; text-align: center; }

  .nav-badge {
    margin-left: auto;
    background: var(--danger);
    color: #fff;
    font-size: 10px;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 20px;
    min-width: 20px;
    text-align: center;
  }

  .sidebar-footer {
    padding: 16px 12px;
    border-top: 1px solid rgba(255,255,255,.08);
  }

  .sidebar-user {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    border-radius: 8px;
    background: rgba(255,255,255,.06);
  }

  .user-avatar {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--primary), #a78bfa);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-size: 14px;
    font-weight: 700;
    flex-shrink: 0;
  }

  .user-info .user-name { color: #fff; font-size: 13px; font-weight: 600; }
  .user-info .user-role { color: rgba(255,255,255,.4); font-size: 11px; }

  /* ── MAIN ── */
  .main {
    margin-left: var(--sidebar-w);
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  /* ── HEADER ── */
  .header {
    height: var(--header-h);
    background: #fff;
    border-bottom: 1px solid var(--gray-200);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 28px;
    position: sticky;
    top: 0;
    z-index: 50;
    box-shadow: 0 1px 4px rgba(0,0,0,.06);
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .hamburger {
    display: none;
    background: none;
    border: none;
    font-size: 22px;
    cursor: pointer;
    color: var(--gray-600);
    padding: 4px;
  }

  .breadcrumb {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
  }

  .breadcrumb a {
    color: var(--gray-500);
    text-decoration: none;
  }

  .breadcrumb a:hover { color: var(--primary); }

  .breadcrumb .sep { color: var(--gray-300); }

  .breadcrumb .current {
    color: var(--gray-800);
    font-weight: 600;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .btn-icon {
    width: 38px; height: 38px;
    border: 1px solid var(--gray-200);
    border-radius: 8px;
    background: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 18px;
    color: var(--gray-500);
    transition: all .2s;
    text-decoration: none;
  }

  .btn-icon:hover {
    border-color: var(--primary);
    color: var(--primary);
    background: var(--primary-light);
  }

  .notif-dot {
    position: relative;
  }

  .notif-dot::after {
    content: '';
    position: absolute;
    top: 6px; right: 6px;
    width: 8px; height: 8px;
    background: var(--danger);
    border-radius: 50%;
    border: 2px solid #fff;
  }

  /* ── CONTENT ── */
  .content {
    flex: 1;
    padding: 28px;
  }

  .page-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 28px;
    gap: 16px;
    flex-wrap: wrap;
  }

  .page-title h1 {
    font-size: 24px;
    font-weight: 700;
    color: var(--gray-800);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .page-title h1 .title-icon {
    width: 36px; height: 36px;
    background: var(--primary-light);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
  }

  .page-title p {
    color: var(--gray-500);
    font-size: 14px;
    margin-top: 4px;
    margin-left: 46px;
  }

  .page-actions {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 18px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: all .2s;
    text-decoration: none;
    white-space: nowrap;
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--primary), #a78bfa);
    color: #fff;
    box-shadow: 0 4px 12px rgba(108,99,255,.3);
  }

  .btn-primary:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(108,99,255,.4);
  }

  .btn-outline {
    background: #fff;
    color: var(--gray-700);
    border: 1px solid var(--gray-200);
  }

  .btn-outline:hover {
    border-color: var(--primary);
    color: var(--primary);
    background: var(--primary-light);
  }

  .btn-success {
    background: linear-gradient(135deg, var(--success), #16a34a);
    color: #fff;
    box-shadow: 0 4px 12px rgba(34,197,94,.3);
  }

  .btn-success:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(34,197,94,.4);
  }

  .btn-sm {
    padding: 6px 12px;
    font-size: 12px;
  }

  /* ── CARDS RESUMO ── */
  .summary-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
    margin-bottom: 28px;
  }

  .summary-card {
    background: #fff;
    border-radius: var(--radius);
    padding: 22px;
    box-shadow: var(--shadow);
    display: flex;
    align-items: center;
    gap: 16px;
    position: relative;
    overflow: hidden;
    transition: transform .2s, box-shadow .2s;
  }

  .summary-card:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow-lg);
  }

  .summary-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 4px;
    height: 100%;
  }

  .summary-card.total::before { background: var(--primary); }
  .summary-card.novos::before { background: var(--info); }
  .summary-card.respondidos::before { background: var(--success); }
  .summary-card.pendentes::before { background: var(--warning); }

  .card-icon {
    width: 52px; height: 52px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    flex-shrink: 0;
  }

  .total .card-icon { background: var(--primary-light); }
  .novos .card-icon { background: var(--info-light); }
  .respondidos .card-icon { background: var(--success-light); }
  .pendentes .card-icon { background: var(--warning-light); }

  .card-info .card-value {
    font-size: 28px;
    font-weight: 800;
    line-height: 1;
    margin-bottom: 4px;
  }

  .total .card-value { color: var(--primary); }
  .novos .card-value { color: var(--info); }
  .respondidos .card-value { color: var(--success); }
  .pendentes .card-value { color: var(--warning); }

  .card-info .card-label {
    font-size: 13px;
    color: var(--gray-500);
    font-weight: 500;
  }

  .card-trend {
    margin-left: auto;
    font-size: 12px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 3px;
  }

  .trend-up { color: var(--success); }
  .trend-down { color: var(--danger); }

  /* ── FILTROS ── */
  .filters-card {
    background: #fff;
    border-radius: var(--radius);
    padding: 20px 24px;
    box-shadow: var(--shadow);
    margin-bottom: 24px;
  }

  .filters-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .filters-title {
    font-size: 14px;
    font-weight: 700;
    color: var(--gray-700);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .filters-row {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    align-items: flex-end;
  }

  .filter-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
    flex: 1;
    min-width: 160px;
  }

  .filter-group label {
    font-size: 12px;
    font-weight: 600;
    color: var(--gray-600);
    text-transform: uppercase;
    letter-spacing: .5px;
  }

  .filter-group input,
  .filter-group select {
    padding: 9px 12px;
    border: 1px solid var(--gray-200);
    border-radius: 8px;
    font-size: 14px;
    color: var(--gray-700);
    background: var(--gray-50);
    transition: border-color .2s, box-shadow .2s;
    outline: none;
    width: 100%;
  }

  .filter-group input:focus,
  .filter-group select:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(108,99,255,.1);
    background: #fff;
  }

  .filter-search {
    position: relative;
  }

  .filter-search input {
    padding-left: 36px;
  }

  .filter-search .search-icon {
    position: absolute;
    left: 11px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--gray-400);
    font-size: 16px;
    pointer-events: none;
  }

  /* ── TABELA ── */
  .table-card {
    background: #fff;
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
  }

  .table-header {
    padding: 20px 24px;
    border-bottom: 1px solid var(--gray-100);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
  }

  .table-title {
    font-size: 16px;
    font-weight: 700;
    color: var(--gray-800);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .table-count {
    background: var(--primary-light);
    color: var(--primary);
    font-size: 12px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 20px;
  }

  .table-wrapper {
    overflow-x: auto;
  }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  thead {
    background: var(--gray-50);
  }

  th {
    padding: 12px 16px;
    text-align: left;
    font-size: 11px;
    font-weight: 700;
    color: var(--gray-500);
    text-transform: uppercase;
    letter-spacing: .8px;
    white-space: nowrap;
    border-bottom: 1px solid var(--gray-200);
    cursor: pointer;
    user-select: none;
    transition: color .2s;
  }

  th:hover { color: var(--primary); }

  th .sort-icon { margin-left: 4px; opacity: .5; }
  th.sorted { color: var(--primary); }
  th.sorted .sort-icon { opacity: 1; }

  td {
    padding: 14px 16px;
    font-size: 14px;
    color: var(--gray-700);
    border-bottom: 1px solid var(--gray-100);
    vertical-align: middle;
  }

  tr:last-child td { border-bottom: none; }

  tr:hover td { background: var(--gray-50); }

  .lead-name {
    font-weight: 600;
    color: var(--gray-800);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .lead-avatar {
    width: 34px; height: 34px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--primary), #a78bfa);
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-size: 12px;
    font-weight: 700;
    flex-shrink: 0;
  }

  .lead-email {
    font-size: 12px;
    color: var(--gray-500);
    margin-top: 2px;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 700;
    white-space: nowrap;
  }

  .badge::before {
    content: '';
    width: 6px; height: 6px;
    border-radius: 50%;
  }

  .badge-novo { background: var(--info-light); color: var(--info); }
  .badge-novo::before { background: var(--info); }

  .badge-respondido { background: var(--success-light); color: #16a34a; }
  .badge-respondido::before { background: var(--success); }

  .badge-pendente { background: var(--warning-light); color: #d97706; }
  .badge-pendente::before { background: var(--warning); }

  .badge-arquivado { background: var(--gray-100); color: var(--gray-500); }
  .badge-arquivado::before { background: var(--gray-400); }

  .area-tag {
    display: inline-flex;
    align-items: center;
    padding: 3px 10px;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 600;
    background: var(--primary-light);
    color: var(--primary);
  }

  .actions-cell {
    display: flex;
    gap: 6px;
    align-items: center;
  }

  .btn-action {
    width: 32px; height: 32px;
    border: 1px solid var(--gray-200);
    border-radius: 6px;
    background: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 15px;
    color: var(--gray-500);
    transition: all .2s;
  }

  .btn-action:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-light); }
  .btn-action.danger:hover { border-color: var(--danger); color: var(--danger); background: var(--danger-light); }
  .btn-action.success:hover { border-color: var(--success); color: var(--success); background: var(--success-light); }

  /* ── EMPTY / LOADING ── */
  .table-empty {
    padding: 60px 24px;
    text-align: center;
    color: var(--gray-400);
  }

  .table-empty .empty-icon { font-size: 48px; margin-bottom: 12px; }
  .table-empty p { font-size: 15px; font-weight: 500; }
  .table-empty small { font-size: 13px; color: var(--gray-400); }

  .loading-row td {
    padding: 20px;
    text-align: center;
    color: var(--gray-400);
  }

  .spinner {
    display: inline-block;
    width: 20px; height: 20px;
    border: 2px solid var(--gray-200);
    border-top-color: var(--primary);
    border-radius: 50%;
    animation: spin .7s linear infinite;
    margin-right: 8px;
    vertical-align: middle;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── PAGINATION ── */
  .pagination {
    padding: 16px 24px;
    border-top: 1px solid var(--gray-100);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
  }

  .pagination-info {
    font-size: 13px;
    color: var(--gray-500);
  }

  .pagination-btns {
    display: flex;
    gap: 6px;
  }

  .page-btn {
    width: 34px; height: 34px;
    border: 1px solid var(--gray-200);
    border-radius: 6px;
    background: #fff;
    font-size: 13px;
    font-weight: 600;
    color: var(--gray-600);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all .2s;
  }

  .page-btn:hover { border-color: var(--primary); color: var(--primary); }
  .page-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }
  .page-btn:disabled { opacity: .4; cursor: not-allowed; }

  /* ── MODAL ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.5);
    backdrop-filter: blur(4px);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    opacity: 0;
    pointer-events: none;
    transition: opacity .25s;
  }

  .modal-overlay.open {
    opacity: 1;
    pointer-events: all;
  }

  .modal {
    background: #fff;
    border-radius: 16px;
    width: 100%;
    max-width: 680px;
    max-height: 90vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    box-shadow: 0 20px 60px rgba(0,0,0,.2);
    transform: scale(.95) translateY(10px);
    transition: transform .25s;
  }

  .modal-overlay.open .modal {
    transform: scale(1) translateY(0);
  }

  .modal-header {
    padding: 24px 28px 20px;
    border-bottom: 1px solid var(--gray-100);
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
  }

  .modal-title-wrap .modal-title {
    font-size: 18px;
    font-weight: 700;
    color: var(--gray-800);
  }

  .modal-title-wrap .modal-subtitle {
    font-size: 13px;
    color: var(--gray-500);
    margin-top: 2px;
  }

  .modal-close {
    width: 36px; height: 36px;
    border: 1px solid var(--gray-200);
    border-radius: 8px;
    background: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 20px;
    color: var(--gray-500);
    flex-shrink: 0;
    transition: all .2s;
  }

  .modal-close:hover { background: var(--danger-light); color: var(--danger); border-color: var(--danger); }

  .modal-body {
    padding: 24px 28px;
    overflow-y: auto;
    flex: 1;
  }

  .modal-section {
    margin-bottom: 24px;
  }

  .modal-section:last-child { margin-bottom: 0; }

  .modal-section-title {
    font-size: 11px;
    font-weight: 700;
    color: var(--gray-400);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 14px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--gray-100);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .detail-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }

  .detail-item {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .detail-item.full { grid-column: 1 / -1; }

  .detail-label {
    font-size: 11px;
    font-weight: 700;
    color: var(--gray-400);
    text-transform: uppercase;
    letter-spacing: .5px;
  }

  .detail-value {
    font-size: 14px;
    color: var(--gray-800);
    font-weight: 500;
  }

  .detail-value a {
    color: var(--primary);
    text-decoration: none;
  }

  .detail-value a:hover { text-decoration: underline; }

  .message-box {
    background: var(--gray-50);
    border: 1px solid var(--gray-200);
    border-radius: 8px;
    padding: 14px;
    font-size: 14px;
    color: var(--gray-700);
    line-height: 1.6;
    white-space: pre-wrap;
  }

  .modal-footer {
    padding: 16px 28px;
    border-top: 1px solid var(--gray-100);
    display: flex;
    justify-content: flex-end;
    gap: 10px;
    background: var(--gray-50);
  }

  .status-select {
    padding: 8px 12px;
    border: 1px solid var(--gray-200);
    border-radius: 8px;
    font-size: 14px;
    color: var(--gray-700);
    background: #fff;
    cursor: pointer;
    outline: none;
    transition: border-color .2s;
  }

  .status-select:focus { border-color: var(--primary); }

  /* ── TOAST ── */
  .toast-container {
    position: fixed;
    bottom: 24px;
    right: 24px;
    z-index: 999;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .toast {
    background: var(--gray-800);
    color: #fff;
    padding: 14px 18px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 10px;
    box-shadow: var(--shadow-lg);
    animation: slideIn .3s ease;
    min-width: 260px;
    max-width: 360px;
  }

  .toast.success
