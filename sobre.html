<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sobre Nós | Formação de Voluntários</title>
<meta name="description" content="Conheça a história, missão, visão e valores da Formação de Voluntários. Transformando vidas através da educação online.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --primary: #2563eb;
    --primary-dark: #1d4ed8;
    --primary-light: #3b82f6;
    --secondary: #0ea5e9;
    --secondary-dark: #0284c7;
    --white: #ffffff;
    --gray-50: #f8fafc;
    --gray-100: #f1f5f9;
    --gray-200: #e2e8f0;
    --gray-300: #cbd5e1;
    --gray-400: #94a3b8;
    --gray-500: #64748b;
    --gray-600: #475569;
    --gray-700: #334155;
    --gray-800: #1e293b;
    --gray-900: #0f172a;
    --shadow-sm: 0 1px 2px rgba(0,0,0,.05);
    --shadow: 0 4px 6px -1px rgba(0,0,0,.1), 0 2px 4px -1px rgba(0,0,0,.06);
    --shadow-md: 0 10px 15px -3px rgba(0,0,0,.1), 0 4px 6px -2px rgba(0,0,0,.05);
    --shadow-lg: 0 20px 25px -5px rgba(0,0,0,.1), 0 10px 10px -5px rgba(0,0,0,.04);
    --shadow-xl: 0 25px 50px -12px rgba(0,0,0,.25);
    --radius: 8px;
    --radius-lg: 16px;
    --radius-xl: 24px;
    --transition: all .3s ease;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Inter', sans-serif;
    color: var(--gray-800);
    background: var(--white);
    line-height: 1.6;
    overflow-x: hidden;
  }

  img { max-width: 100%; display: block; }
  a { text-decoration: none; color: inherit; }
  ul { list-style: none; }

  .container {
    width: 100%;
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 24px;
  }

  /* ===== HEADER ===== */
  header {
    position: sticky;
    top: 0;
    z-index: 1000;
    background: var(--white);
    border-bottom: 1px solid var(--gray-200);
    box-shadow: var(--shadow-sm);
  }

  .header-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 72px;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 800;
    font-size: 1.2rem;
    color: var(--primary);
    white-space: nowrap;
  }

  .logo-icon {
    width: 40px;
    height: 40px;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--white);
    font-size: 1.1rem;
    flex-shrink: 0;
  }

  nav { display: flex; align-items: center; gap: 8px; }

  nav a {
    padding: 8px 14px;
    border-radius: var(--radius);
    font-size: .9rem;
    font-weight: 500;
    color: var(--gray-600);
    transition: var(--transition);
  }

  nav a:hover, nav a.active {
    background: var(--gray-100);
    color: var(--primary);
  }

  .nav-cta {
    background: linear-gradient(135deg, var(--primary), var(--secondary)) !important;
    color: var(--white) !important;
    padding: 10px 20px !important;
    border-radius: 50px !important;
    font-weight: 600 !important;
    box-shadow: var(--shadow);
  }

  .nav-cta:hover {
    opacity: .9;
    transform: translateY(-1px);
    box-shadow: var(--shadow-md) !important;
    background: linear-gradient(135deg, var(--primary), var(--secondary)) !important;
  }

  .hamburger {
    display: none;
    flex-direction: column;
    gap: 5px;
    cursor: pointer;
    padding: 8px;
    border-radius: var(--radius);
    transition: var(--transition);
    background: none;
    border: none;
  }

  .hamburger:hover { background: var(--gray-100); }

  .hamburger span {
    display: block;
    width: 24px;
    height: 2px;
    background: var(--gray-700);
    border-radius: 2px;
    transition: var(--transition);
  }

  .hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
  .hamburger.open span:nth-child(2) { opacity: 0; }
  .hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

  .mobile-menu {
    display: none;
    flex-direction: column;
    background: var(--white);
    border-top: 1px solid var(--gray-200);
    padding: 16px 24px 24px;
    gap: 4px;
  }

  .mobile-menu.open { display: flex; }

  .mobile-menu a {
    padding: 12px 16px;
    border-radius: var(--radius);
    font-size: .95rem;
    font-weight: 500;
    color: var(--gray-700);
    transition: var(--transition);
  }

  .mobile-menu a:hover, .mobile-menu a.active {
    background: var(--gray-100);
    color: var(--primary);
  }

  .mobile-menu .nav-cta {
    background: linear-gradient(135deg, var(--primary), var(--secondary)) !important;
    color: var(--white) !important;
    text-align: center;
    margin-top: 8px;
    border-radius: 50px !important;
  }

  /* ===== HERO SOBRE ===== */
  .about-hero {
    background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
    padding: 100px 0 80px;
    position: relative;
    overflow: hidden;
  }

  .about-hero::before {
    content: '';
    position: absolute;
    top: -50%;
    right: -20%;
    width: 600px;
    height: 600px;
    background: rgba(255,255,255,.05);
    border-radius: 50%;
  }

  .about-hero::after {
    content: '';
    position: absolute;
    bottom: -30%;
    left: -10%;
    width: 400px;
    height: 400px;
    background: rgba(255,255,255,.05);
    border-radius: 50%;
  }

  .about-hero-content {
    position: relative;
    z-index: 1;
    text-align: center;
    color: var(--white);
  }

  .breadcrumb {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(255,255,255,.15);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,.2);
    padding: 8px 20px;
    border-radius: 50px;
    font-size: .85rem;
    font-weight: 500;
    margin-bottom: 32px;
    color: rgba(255,255,255,.9);
  }

  .breadcrumb a { color: rgba(255,255,255,.7); transition: var(--transition); }
  .breadcrumb a:hover { color: var(--white); }
  .breadcrumb span { color: rgba(255,255,255,.5); }

  .about-hero h1 {
    font-size: clamp(2.2rem, 5vw, 3.5rem);
    font-weight: 900;
    line-height: 1.15;
    margin-bottom: 24px;
    letter-spacing: -1px;
  }

  .about-hero p {
    font-size: 1.15rem;
    color: rgba(255,255,255,.85);
    max-width: 600px;
    margin: 0 auto 40px;
    line-height: 1.7;
  }

  .hero-stats {
    display: flex;
    justify-content: center;
    gap: 48px;
    flex-wrap: wrap;
  }

  .hero-stat {
    text-align: center;
  }

  .hero-stat-number {
    font-size: 2.5rem;
    font-weight: 900;
    color: var(--white);
    line-height: 1;
    margin-bottom: 6px;
  }

  .hero-stat-label {
    font-size: .85rem;
    color: rgba(255,255,255,.75);
    font-weight: 500;
  }

  /* ===== HISTÓRIA ===== */
  .section { padding: 96px 0; }
  .section-alt { background: var(--gray-50); }

  .section-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: linear-gradient(135deg, rgba(37,99,235,.1), rgba(14,165,233,.1));
    color: var(--primary);
    padding: 8px 18px;
    border-radius: 50px;
    font-size: .82rem;
    font-weight: 700;
    letter-spacing: .5px;
    text-transform: uppercase;
    margin-bottom: 20px;
    border: 1px solid rgba(37,99,235,.15);
  }

  .section-title {
    font-size: clamp(1.8rem, 3.5vw, 2.6rem);
    font-weight: 800;
    color: var(--gray-900);
    line-height: 1.2;
    letter-spacing: -.5px;
    margin-bottom: 20px;
  }

  .section-title span {
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .section-subtitle {
    font-size: 1.05rem;
    color: var(--gray-500);
    line-height: 1.7;
    max-width: 560px;
  }

  .history-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 80px;
    align-items: center;
  }

  .history-text p {
    font-size: 1rem;
    color: var(--gray-600);
    line-height: 1.8;
    margin-bottom: 20px;
  }

  .history-text p:last-child { margin-bottom: 0; }

  .history-image {
    position: relative;
  }

  .history-image img {
    width: 100%;
    border-radius: var(--radius-xl);
    box-shadow: var(--shadow-xl);
  }

  .history-badge {
    position: absolute;
    bottom: -24px;
    left: -24px;
    background: var(--white);
    border-radius: var(--radius-lg);
    padding: 20px 24px;
    box-shadow: var(--shadow-lg);
    display: flex;
    align-items: center;
    gap: 14px;
    min-width: 220px;
  }

  .history-badge-icon {
    width: 52px;
    height: 52px;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.4rem;
    flex-shrink: 0;
  }

  .history-badge-text strong {
    display: block;
    font-size: 1.4rem;
    font-weight: 800;
    color: var(--gray-900);
    line-height: 1;
    margin-bottom: 4px;
  }

  .history-badge-text span {
    font-size: .8rem;
    color: var(--gray-500);
    font-weight: 500;
  }

  /* ===== MISSÃO VISÃO VALORES ===== */
  .mvv-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 32px;
    margin-top: 60px;
  }

  .mvv-card {
    background: var(--white);
    border-radius: var(--radius-xl);
    padding: 40px 32px;
    box-shadow: var(--shadow);
    border: 1px solid var(--gray-200);
    transition: var(--transition);
    position: relative;
    overflow: hidden;
  }

  .mvv-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 4px;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
  }

  .mvv-card:hover {
    transform: translateY(-6px);
    box-shadow: var(--shadow-xl);
    border-color: transparent;
  }

  .mvv-icon {
    width: 64px;
    height: 64px;
    background: linear-gradient(135deg, rgba(37,99,235,.1), rgba(14,165,233,.1));
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.8rem;
    margin-bottom: 24px;
    border: 1px solid rgba(37,99,235,.1);
  }

  .mvv-card h3 {
    font-size: 1.3rem;
    font-weight: 700;
    color: var(--gray-900);
    margin-bottom: 14px;
  }

  .mvv-card p {
    font-size: .95rem;
    color: var(--gray-600);
    line-height: 1.7;
  }

  /* ===== VALORES LISTA ===== */
  .values-section {
    margin-top: 60px;
  }

  .values-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 24px;
    margin-top: 40px;
  }

  .value-item {
    display: flex;
    align-items: flex-start;
    gap: 16px;
    background: var(--white);
    border-radius: var(--radius-lg);
    padding: 24px;
    box-shadow: var(--shadow-sm);
    border: 1px solid var(--gray-200);
    transition: var(--transition);
  }

  .value-item:hover {
    box-shadow: var(--shadow-md);
    border-color: rgba(37,99,235,.2);
    transform: translateY(-2px);
  }

  .value-icon {
    width: 44px;
    height: 44px;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.1rem;
    flex-shrink: 0;
    color: var(--white);
  }

  .value-text h4 {
    font-size: 1rem;
    font-weight: 700;
    color: var(--gray-900);
    margin-bottom: 6px;
  }

  .value-text p {
    font-size: .88rem;
    color: var(--gray-500);
    line-height: 1.6;
  }

  /* ===== LINHA DO TEMPO ===== */
  .timeline {
    position: relative;
    padding: 40px 0;
  }

  .timeline::before {
    content: '';
    position: absolute;
    left: 50%;
    top: 0;
    bottom: 0;
    width: 2px;
    background: linear-gradient(to bottom, var(--primary), var(--secondary));
    transform: translateX(-50%);
  }

  .timeline-item {
    display: flex;
    align-items: flex-start;
    margin-bottom: 60px;
    position: relative;
  }

  .timeline-item:last-child { margin-bottom: 0; }

  .timeline-item:nth-child(odd) {
    flex-direction: row;
    padding-right: calc(50% + 40px);
  }

  .timeline-item:nth-child(even) {
    flex-direction: row-reverse;
    padding-left: calc(50% + 40px);
  }

  .timeline-dot {
    position: absolute;
    left: 50%;
    top: 20px;
    transform: translateX(-50%);
    width: 20px;
    height: 20px;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    border-radius: 50%;
    border: 4px solid var(--white);
    box-shadow: 0 0 0 3px var(--primary);
    z-index: 1;
  }

  .timeline-content {
    background: var(--white);
    border-radius: var(--radius-lg);
    padding: 28px;
    box-shadow: var(--shadow-md);
    border: 1px solid var(--gray-200);
    transition: var(--transition);
    width: 100%;
  }

  .timeline-content:hover {
    box-shadow: var(--shadow-lg);
    transform: translateY(-3px);
  }

  .timeline-year {
    display: inline-block;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    color: var(--white);
    font-size: .8rem;
    font-weight: 700;
    padding: 4px 14px;
    border-radius: 50px;
    margin-bottom: 12px;
    letter-spacing: .5px;
  }

  .timeline-content h3 {
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--gray-900);
    margin-bottom: 10px;
  }

  .timeline-content p {
    font-size: .9rem;
    color: var(--gray-600);
    line-height: 1.7;
  }

  /* ===== EQUIPE ===== */
  .team-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 32px;
    margin-top: 60px;
  }

  .team-card {
    background: var(--white);
    border-radius: var(--radius-xl);
    overflow: hidden;
    box-shadow: var(--shadow);
    border: 1px solid var(--gray-200);
    transition: var(--transition);
    text-align: center;
  }

  .team-card:hover {
    transform: translateY(-8px);
    box-shadow: var(--shadow-xl);
    border-color: transparent;
  }

  .team-photo {
    position: relative;
    overflow: hidden;
  }

  .team-photo img {
    width: 100%;
    height: 280px;
    object-fit: cover;
    transition: transform .4s ease;
  }

  .team-card:hover .team-photo img {
    transform: scale(1.05);
  }

  .team-photo-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(37,99,235,.8), transparent);
    opacity: 0;
    transition: var(--transition);
    display: flex;
    align-items: flex-end;
    justify-content: center;
    padding-bottom: 20px;
    gap: 12px;
  }

  .team-card:hover .team-photo-overlay { opacity: 1; }

  .team-social-btn {
    width: 40px;
    height: 40px;
    background: rgba(255,255,255,.9);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: .9rem;
    color: var(--primary);
    transition: var(--transition);
    cursor: pointer;
    border: none;
  }

  .team-social-btn:hover {
    background: var(--white);
    transform: translateY(-3px);
  }

  .team-info {
    padding: 24px;
  }

  .team-info h3 {
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--gray-900);
    margin-bottom: 6px;
  }

  .team-role {
    font-size: .85rem;
    color: var(--primary);
    font-weight: 600;
    margin-bottom: 12px;
  }

  .team-bio {
    font-size: .85rem;
    color: var(--gray-500);
    line-height: 1.6;
  }

  /* ===== NÚMEROS ===== */
  .numbers-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 32px;
  }

  .number-card {
    text-align: center;
    padding: 40px 24px;
    background: var(--white);
    border-radius: var(--radius-xl);
    box-shadow: var(--shadow);
    border: 1px solid var(--gray-200);
    transition: var(--transition);
  }

  .number-card:hover {
    transform: translateY(-6px);
    box-shadow: var(--shadow-xl);
  }

  .number-icon {
    width: 64px;
    height: 64px;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.8rem;
    margin: 0 auto 20px;
    color: var(--white);
  }

  .number-value {
    font-size: 2.8rem;
    font-weight: 900;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
    margin-bottom: 8px;
  }

  .number-label {
    font-size: .9rem;
    color: var(--gray-500);
    font-weight: 500;
  }

  /* ===== DEPOIMENTOS ===== */
  .testimonials-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 28px;
    margin-top: 60px;
  }

  .testimonial-card {
    background: var(--white);
    border-radius: var(--radius-xl);
    padding: 32px;
    box-shadow: var(--shadow);
    border: 1px solid var(--gray-200);
    transition: var(--transition);
    position: relative;
  }

  .testimonial-card::before {
    content: '"';
    position: absolute;
    top: 20px;
    right: 28px;
    font-size: 5rem;
    color: var(--gray-200);
    font-family: Georgia, serif;
    line-height: 1;
  }

  .testimonial-card:hover {
    transform: translateY(-4px);
    box-shadow: var(--shadow-xl);
  }

  .stars {
    display: flex;
    gap: 4px;
    margin-bottom: 16px;
  }

  .star { color: #f59e0b; font-size: 1rem; }

  .testimonial-text {
    font-size: .95rem;
    color: var(--gray-600);
    line-height: 1.7;
    margin-bottom: 24px;
    font-style: italic;
  }

  .testimonial-author {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .testimonial-author img {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid var(--primary);
  }

  .author-info strong {
    display: block;
    font-size: .9rem;
    font-weight: 700;
    color: var(--gray-900);
  }

  .author-info span {
    font-size: .8rem;
    color: var(--gray-500);
  }

  /* ===== CTA ===== */
  .cta-section {
    background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
    padding: 96px 0;
    position: relative;
    overflow: hidden;
    text-align: center;
  }

  .cta-section::before {
    content: '';
    position: absolute;
    top: -40%;
    left: -10%;
    width: 500px;
    height: 500px;
    background: rgba(255,255,255,.06);
    border-radius: 50%;
  }

  .cta-section::after {
    content: '';
    position: absolute;
    bottom: -40%;
    right: -10%;
    width: 400px;
    height: 400px;
    background: rgba(255,255,255,.06);
    border-radius: 50%;
  }

  .cta-content { position: relative; z-index: 1; }

  .cta-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(255,255,255,.15);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,.2);
    color: var(--white);
    padding: 8px 20px;
    border-radius: 50px;
    font-size: .82rem;
    font-weight: 600;
    letter-spacing: .5px;
    text-transform: uppercase;
    margin-bottom: 28px;
  }

  .cta-section h2 {
    font-size: clamp(2rem, 4vw, 3rem);
    font-weight: 900;
    color: var(--white);
    line-height: 1.2;
    letter-spacing: -.5px;
    margin-bottom: 20px;
  }

  .cta-section p {
    font-size: 1.1rem;
    color: rgba(255,255,255,.85);
    max-width: 560px;
    margin: 0 auto 40px;
    line-height: 1.7;
  }

  .cta-buttons {
    display: flex;
    gap: 16px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 16px 32px;
    border-radius: 50px;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: var(--transition);
    border: none;
    text-decoration: none;
    white-space: nowrap;
  }

  .btn-white {
    background: var(--white);
    color: var(--primary);
    box-shadow: var(--shadow-lg);
  }

  .btn-white:hover {
    transform: translateY(-3px);
    box-shadow: var(--shadow-xl);
    background: var(--gray-50);
  }

  .btn-outline-white {
    background: transparent;
    color: var(--white);
    border: 2px solid rgba(255,255,255,.6);
  }

  .btn-outline-white:hover {
    background: rgba(255,255,255,.1);
    border-color: var(--white);
    transform: translateY(-3px);
  }

  /* ===== FOOTER ===== */
  footer {
    background: var(--gray-900);
    color: var(--gray-400);
    padding: 80px 0 0;
  }

  .footer-grid {
    display: grid;
    grid-template-columns: 2fr 1fr 1fr 1fr;
    gap: 48px;
    margin-bottom: 60px;
  }

  .footer-brand .logo { color: var(--white); margin-bottom: 20px; }

  .footer-brand p {
    font-size: .9rem;
    line-height: 1.7;
    margin-bottom: 28px;
    color: var(--gray-500);
  }

  .footer-social {
    display: flex;
    gap: 12px;
  }

  .social-btn {
    width: 40px;
    height: 40px;
    background: var(--gray-800);
    border-radius: 10px
