<!DOCTYPE html>
<html lang="pt-BR">

<meta charset="UTF-8">

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --primary: #2563eb;
    --primary-dark: #1d4ed8;
    --secondary: #0ea5e9;
    --secondary-dark: #0284c7;
    --text: #1e293b;
    --text-light: #64748b;
    --bg: #f8fafc;
    --white: #ffffff;
    --border: #e2e8f0;
    --shadow: 0 4px 24px rgba(37,99,235,0.08);
    --radius: 12px;
  }
  html { scroll-behavior: smooth; }
  body { font-family: 'Inter', sans-serif; color: var(--text); background: var(--bg); line-height: 1.6; }
  a { text-decoration: none; color: inherit; }
  img { max-width: 100%; display: block; }
  ul { list-style: none; }

  /* ===== HEADER ===== */
  header {
    position: sticky; top: 0; z-index: 1000;
    background: var(--white);
    box-shadow: 0 2px 16px rgba(37,99,235,0.08);
  }
  .header-inner {
    max-width: 1200px; margin: 0 auto;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 24px; height: 70px;
  }
  .logo {
    display: flex; align-items: center; gap: 10px;
    font-weight: 800; font-size: 1.2rem; color: var(--primary);
  }
  .logo-icon {
    width: 40px; height: 40px; border-radius: 10px;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    display: flex; align-items: center; justify-content: center;
    color: white; font-size: 1.2rem; font-weight: 800; flex-shrink: 0;
  }
  nav { display: flex; align-items: center; gap: 8px; }
  nav a {
    padding: 8px 14px; border-radius: 8px;
    font-weight: 500; font-size: 0.9rem; color: var(--text-light);
    transition: all 0.2s;
  }
  nav a:hover, nav a.active { color: var(--primary); background: #eff6ff; }
  .btn-nav {
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    color: white !important; padding: 9px 18px !important;
    border-radius: 8px !important; font-weight: 600 !important;
    transition: opacity 0.2s !important;
  }
  .btn-nav:hover { opacity: 0.9; background: #eff6ff !important; color: white !important; }
  .hamburger {
    display: none; flex-direction: column; gap: 5px;
    cursor: pointer; padding: 8px; border: none; background: none;
  }
  .hamburger span {
    display: block; width: 24px; height: 2px;
    background: var(--text); border-radius: 2px; transition: all 0.3s;
  }
  .mobile-menu {
    display: none; position: fixed; top: 70px; left: 0; right: 0;
    background: var(--white); padding: 16px 24px 24px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.1); z-index: 999; flex-direction: column; gap: 4px;
  }
  .mobile-menu.open { display: flex; }
  .mobile-menu a {
    padding: 12px 16px; border-radius: 8px; font-weight: 500;
    color: var(--text); transition: all 0.2s;
  }
  .mobile-menu a:hover, .mobile-menu a.active { color: var(--primary); background: #eff6ff; }

  /* ===== PAGE HERO ===== */
  .page-hero {
    background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
    color: white; padding: 64px 24px; text-align: center;
  }
  .page-hero h1 { font-size: clamp(1.8rem, 4vw, 2.8rem); font-weight: 800; margin-bottom: 12px; }
  .page-hero p { font-size: 1.1rem; opacity: 0.9; max-width: 600px; margin: 0 auto; }
  .breadcrumb {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    margin-bottom: 20px; font-size: 0.9rem; opacity: 0.85;
  }
  .breadcrumb a { color: white; } .breadcrumb span { opacity: 0.6; }

  /* ===== MAIN LAYOUT ===== */
  .main-container {
    max-width: 1200px; margin: 0 auto; padding: 48px 24px;
    display: grid; grid-template-columns: 1fr 320px; gap: 40px;
  }

  /* ===== FILTERS ===== */
  .filters-bar {
    display: flex; align-items: center; flex-wrap: wrap; gap: 10px; margin-bottom: 32px;
  }
  .filter-label { font-weight: 600; font-size: 0.9rem; color: var(--text-light); margin-right: 4px; }
  .filter-btn {
    padding: 7px 16px; border-radius: 20px; border: 2px solid var(--border);
    background: white; font-size: 0.85rem; font-weight: 500; cursor: pointer;
    color: var(--text-light); transition: all 0.2s;
  }
  .filter-btn:hover { border-color: var(--primary); color: var(--primary); }
  .filter-btn.active {
    background: var(--primary); border-color: var(--primary);
    color: white;
  }
  .search-box {
    margin-left: auto; display: flex; align-items: center;
    background: white; border: 2px solid var(--border); border-radius: 24px;
    padding: 6px 14px; gap: 8px; transition: border-color 0.2s;
  }
  .search-box:focus-within { border-color: var(--primary); }
  .search-box input {
    border: none; outline: none; font-size: 0.85rem; color: var(--text);
    background: transparent; width: 180px;
  }
  .search-box svg { color: var(--text-light); flex-shrink: 0; }

  /* ===== POSTS GRID ===== */
  .posts-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 24px;
  }
  .post-card {
    background: white; border-radius: var(--radius); overflow: hidden;
    box-shadow: var(--shadow); transition: transform 0.3s, box-shadow 0.3s;
    display: flex; flex-direction: column;
  }
  .post-card:hover { transform: translateY(-4px); box-shadow: 0 12px 40px rgba(37,99,235,0.15); }
  .post-card-img {
    width: 100%; height: 180px; object-fit: cover;
    background: linear-gradient(135deg, #eff6ff, #e0f2fe);
    display: flex; align-items: center; justify-content: center;
    font-size: 3rem; color: var(--primary);
  }
  .post-card-img img { width: 100%; height: 100%; object-fit: cover; }
  .post-card-body { padding: 20px; flex: 1; display: flex; flex-direction: column; }
  .post-category {
    display: inline-block; padding: 3px 10px; border-radius: 12px;
    background: #eff6ff; color: var(--primary); font-size: 0.75rem; font-weight: 600;
    margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.5px;
  }
  .post-card-body h3 {
    font-size: 1rem; font-weight: 700; color: var(--text); margin-bottom: 8px;
    line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2;
    -webkit-box-orient: vertical; overflow: hidden;
  }
  .post-card-body p {
    font-size: 0.875rem; color: var(--text-light); line-height: 1.6;
    display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;
    overflow: hidden; flex: 1; margin-bottom: 16px;
  }
  .post-meta {
    display: flex; align-items: center; gap: 12px;
    font-size: 0.78rem; color: var(--text-light); padding-top: 12px;
    border-top: 1px solid var(--border);
  }
  .post-meta span { display: flex; align-items: center; gap: 4px; }
  .post-read-more {
    display: inline-flex; align-items: center; gap: 6px;
    color: var(--primary); font-weight: 600; font-size: 0.85rem;
    margin-top: 12px; transition: gap 0.2s;
  }
  .post-read-more:hover { gap: 10px; }

  /* ===== LOADING / EMPTY ===== */
  .loading-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 24px;
  }
  .skeleton-card {
    background: white; border-radius: var(--radius); overflow: hidden;
    box-shadow: var(--shadow);
  }
  .skeleton { background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
  @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
  .skeleton-img { height: 180px; }
  .skeleton-body { padding: 20px; }
  .skeleton-line { height: 12px; border-radius: 6px; margin-bottom: 10px; }
  .skeleton-line.short { width: 60%; }
  .skeleton-line.medium { width: 80%; }
  .empty-state {
    text-align: center; padding: 60px 24px; grid-column: 1/-1;
  }
  .empty-state svg { color: var(--text-light); margin: 0 auto 16px; opacity: 0.4; }
  .empty-state h3 { font-size: 1.2rem; color: var(--text-light); margin-bottom: 8px; }
  .empty-state p { color: var(--text-light); font-size: 0.9rem; }

  /* ===== PAGINATION ===== */
  .pagination {
    display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 40px;
  }
  .page-btn {
    width: 40px; height: 40px; border-radius: 8px; border: 2px solid var(--border);
    background: white; font-size: 0.9rem; font-weight: 600; cursor: pointer;
    color: var(--text-light); transition: all 0.2s; display: flex; align-items: center; justify-content: center;
  }
  .page-btn:hover { border-color: var(--primary); color: var(--primary); }
  .page-btn.active { background: var(--primary); border-color: var(--primary); color: white; }
  .page-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .page-info { font-size: 0.85rem; color: var(--text-light); padding: 0 8px; }

  /* ===== SIDEBAR ===== */
  .sidebar { display: flex; flex-direction: column; gap: 28px; }
  .sidebar-widget {
    background: white; border-radius: var(--radius); padding: 24px;
    box-shadow: var(--shadow);
  }
  .widget-title {
    font-size: 1rem; font-weight: 700; color: var(--text); margin-bottom: 16px;
    padding-bottom: 12px; border-bottom: 2px solid var(--primary);
    display: flex; align-items: center; gap: 8px;
  }
  .widget-title svg { color: var(--primary); }

  /* Recent posts */
  .recent-post {
    display: flex; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border);
    transition: background 0.2s; cursor: pointer;
  }
  .recent-post:last-child { border-bottom: none; padding-bottom: 0; }
  .recent-post:hover .recent-post-title { color: var(--primary); }
  .recent-post-img {
    width: 64px; height: 64px; border-radius: 8px; flex-shrink: 0;
    background: linear-gradient(135deg, #eff6ff, #e0f2fe);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.5rem; overflow: hidden;
  }
  .recent-post-img img { width: 100%; height: 100%; object-fit: cover; }
  .recent-post-info { flex: 1; min-width: 0; }
  .recent-post-title {
    font-size: 0.85rem; font-weight: 600; color: var(--text);
    line-height: 1.4; margin-bottom: 4px; transition: color 0.2s;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  .recent-post-date { font-size: 0.75rem; color: var(--text-light); }

  /* Categories widget */
  .cat-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 12px; border-radius: 8px; cursor: pointer;
    transition: background 0.2s; font-size: 0.875rem;
  }
  .cat-item:hover { background: #eff6ff; color: var(--primary); }
  .cat-item span:first-child { display: flex; align-items: center; gap: 8px; font-weight: 500; }
  .cat-count {
    background: #eff6ff; color: var(--primary); padding: 2px 8px;
    border-radius: 10px; font-size: 0.75rem; font-weight: 600;
  }

  /* Newsletter widget */
  .newsletter-widget { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; }
  .newsletter-widget .widget-title { color: white; border-bottom-color: rgba(255,255,255,0.3); }
  .newsletter-widget p { font-size: 0.875rem; opacity: 0.9; margin-bottom: 16px; }
  .newsletter-form { display: flex; flex-direction: column; gap: 10px; }
  .newsletter-form input {
    padding: 10px 14px; border-radius: 8px; border: none;
    font-size: 0.875rem; outline: none; color: var(--text);
  }
  .newsletter-form button {
    padding: 10px; border-radius: 8px; border: 2px solid white;
    background: white; color: var(--primary); font-weight: 700;
    cursor: pointer; font-size: 0.875rem; transition: all 0.2s;
  }
  .newsletter-form button:hover { background: transparent; color: white; }

  /* Tags widget */
  .tags-cloud { display: flex; flex-wrap: wrap; gap: 8px; }
  .tag {
    padding: 5px 12px; border-radius: 16px; border: 1px solid var(--border);
    font-size: 0.8rem; color: var(--text-light); cursor: pointer; transition: all 0.2s;
  }
  .tag:hover { background: var(--primary); color: white; border-color: var(--primary); }

  /* ===== WHATSAPP FLOAT ===== */
  .whatsapp-float {
    position: fixed; bottom: 88px; right: 24px; z-index: 999;
    width: 56px; height: 56px; border-radius: 50%;
    background: #25d366; color: white; display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 20px rgba(37,211,102,0.4); transition: transform 0.3s;
    cursor: pointer;
  }
  .whatsapp-float:hover { transform: scale(1.1); }
  .whatsapp-float svg { width: 28px; height: 28px; }

  /* ===== LGPD BANNER ===== */
  .lgpd-banner {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 1100;
    background: #1e293b; color: white; padding: 16px 24px;
    display: flex; align-items: center; justify-content: space-between; gap: 16px;
    flex-wrap: wrap;
  }
  .lgpd-banner.hidden { display: none; }
  .lgpd-text { font-size: 0.85rem; opacity: 0.9; flex: 1; min-width: 200px; }
  .lgpd-text a { color: var(--secondary); text-decoration: underline; }
  .lgpd-actions { display: flex; gap: 10px; flex-shrink: 0; }
  .lgpd-btn {
    padding: 8px 18px; border-radius: 8px; font-size: 0.85rem;
    font-weight: 600; cursor: pointer; border: none; transition: all 0.2s;
  }
  .lgpd-accept { background: var(--primary); color: white; }
  .lgpd-accept:hover { background: var(--primary-dark); }
  .lgpd-decline { background: transparent; color: white; border: 1px solid rgba(255,255,255,0.3); }
  .lgpd-decline:hover { background: rgba(255,255,255,0.1); }

  /* ===== FOOTER ===== */
  footer {
    background: #0f172a; color: #94a3b8; padding: 60px 24px 24px;
  }
  .footer-grid {
    max-width: 1200px; margin: 0 auto;
    display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap: 40px; margin-bottom: 40px;
  }
  .footer-brand .logo { color: white; margin-bottom: 12px; }
  .footer-brand p { font-size: 0.875rem; line-height: 1.7; margin-bottom: 20px; }
  .footer-socials { display: flex; gap: 10px; }
  .social-btn {
    width: 38px; height: 38px; border-radius: 8px;
    background: rgba(255,255,255,0.08); color: #94a3b8;
    display: flex; align-items: center; justify-content: center; transition: all 0.2s;
  }
  .social-btn:hover { background: var(--primary); color: white; }
  .footer-col h4 { color: white; font-size: 0.95rem; font-weight: 700; margin-bottom: 16px; }
  .footer-col ul { display: flex; flex-direction: column; gap: 10px; }
  .footer-col ul a { font-size: 0.875rem; color: #94a3b8; transition: color 0.2s; }
  .footer-col ul a:hover { color: var(--secondary); }
  .footer-bottom {
    max-width: 1200px; margin: 0 auto;
    border-top: 1px solid rgba(255,255,255,0.08); padding-top: 24px;
    display: flex; align-items: center; justify-content: space-between; flex-wrap: gap;
    font-size: 0.8rem; gap: 12px;
  }
  .footer-bottom a { color: var(--secondary); }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 1024px) {
    .main-container { grid-template-columns: 1fr; }
    .sidebar { order: -1; display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); }
    .footer-grid { grid-template-columns: 1fr 1fr; }
  }
  @media (max-width: 768px) {
    nav { display: none; }
    .hamburger { display: flex; }
    .search-box { margin-left: 0; width: 100%; }
    .search-box input { width: 100%; }
    .filters-bar { flex-direction: column; align-items: flex-start; }
    .footer-grid { grid-template-columns: 1fr; gap: 28px; }
    .footer-bottom { flex-direction: column; text-align: center; }
    .sidebar { grid-template-columns: 1fr; }
    .lgpd-banner { flex-direction: column; }
  }
  @media (max-width: 480px) {
    .posts-grid { grid-template-columns: 1fr; }
  }

  /* ===== TOAST ===== */
  .toast {
    position: fixed; top: 90px; right: 24px; z-index: 2000;
    background: #1e293b; color: white; padding: 12px 20px;
    border-radius: 10px; font-size: 0.875rem; font-weight: 500;
    box-shadow: 0 8px 24px rgba(0,0,0,0.2); transform: translateX(120%);
    transition: transform 0.3s; display: flex; align-items: center; gap: 10px;
  }
  .toast.show { transform: translateX(0); }
  .toast.success { border-left: 4px solid #22c55e; }
  .toast.error { border-left: 4px solid #ef4444; }
</style>
</head>
