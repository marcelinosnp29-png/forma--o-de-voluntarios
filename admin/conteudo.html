<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - Gestor de Conteúdo | Formação de Voluntários</title>

<!-- Quill.js -->
<link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet">
<script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
  :root {
    --primary: #6366f1;
    --primary-dark: #4f46e5;
    --primary-light: #e0e7ff;
    --secondary: #0ea5e9;
    --success: #10b981;
    --warning: #f59e0b;
    --danger: #ef4444;
    --dark: #0f172a;
    --dark-2: #1e293b;
    --dark-3: #334155;
    --gray: #64748b;
    --gray-light: #94a3b8;
    --border: #e2e8f0;
    --bg: #f8fafc;
    --white: #ffffff;
    --sidebar-w: 270px;
    --shadow: 0 1px 3px rgba(0,0,0,.1), 0 1px 2px rgba(0,0,0,.06);
    --shadow-md: 0 4px 6px -1px rgba(0,0,0,.1), 0 2px 4px -1px rgba(0,0,0,.06);
    --shadow-lg: 0 10px 15px -3px rgba(0,0,0,.1), 0 4px 6px -2px rgba(0,0,0,.05);
    --radius: 10px;
    --radius-sm: 6px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--dark);
    display: flex;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ===== SIDEBAR ===== */
  .sidebar {
    width: var(--sidebar-w);
    background: var(--dark);
    min-height: 100vh;
    position: fixed;
    left: 0; top: 0;
    display: flex;
    flex-direction: column;
    z-index: 100;
    transition: transform .3s ease;
  }

  .sidebar-logo {
    padding: 24px 20px;
    border-bottom: 1px solid rgba(255,255,255,.08);
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .sidebar-logo .logo-icon {
    width: 40px; height: 40px;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    border-radius: var(--radius-sm);
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 18px;
    flex-shrink: 0;
  }

  .sidebar-logo .logo-text {
    display: flex;
    flex-direction: column;
  }

  .sidebar-logo .logo-text span:first-child {
    font-size: 13px;
    font-weight: 700;
    color: white;
    line-height: 1.2;
  }

  .sidebar-logo .logo-text span:last-child {
    font-size: 10px;
    color: var(--gray-light);
    font-weight: 400;
    text-transform: uppercase;
    letter-spacing: .5px;
  }

  .sidebar-nav {
    padding: 16px 12px;
    flex: 1;
    overflow-y: auto;
  }

  .nav-section-title {
    font-size: 10px;
    font-weight: 600;
    color: var(--gray);
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 8px 8px 6px;
    margin-top: 8px;
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    border-radius: var(--radius-sm);
    color: #94a3b8;
    font-size: 13.5px;
    font-weight: 500;
    cursor: pointer;
    transition: all .2s;
    margin-bottom: 2px;
    text-decoration: none;
    border: none;
    background: none;
    width: 100%;
    text-align: left;
  }

  .nav-item:hover {
    background: rgba(255,255,255,.06);
    color: white;
  }

  .nav-item.active {
    background: var(--primary);
    color: white;
  }

  .nav-item i { width: 18px; text-align: center; font-size: 14px; }

  .nav-item .badge {
    margin-left: auto;
    background: rgba(255,255,255,.15);
    color: white;
    font-size: 10px;
    font-weight: 600;
    padding: 2px 7px;
    border-radius: 20px;
    min-width: 20px;
    text-align: center;
  }

  .nav-item.active .badge { background: rgba(255,255,255,.25); }

  .sidebar-footer {
    padding: 16px 12px;
    border-top: 1px solid rgba(255,255,255,.08);
  }

  .user-card {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: background .2s;
  }

  .user-card:hover { background: rgba(255,255,255,.06); }

  .user-avatar {
    width: 34px; height: 34px;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 13px;
    font-weight: 700;
    flex-shrink: 0;
  }

  .user-info { flex: 1; min-width: 0; }
  .user-info .name { font-size: 12.5px; font-weight: 600; color: white; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .user-info .role { font-size: 11px; color: var(--gray-light); }

  /* ===== MAIN ===== */
  .main {
    margin-left: var(--sidebar-w);
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  /* ===== TOPBAR ===== */
  .topbar {
    background: var(--white);
    border-bottom: 1px solid var(--border);
    padding: 0 28px;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 50;
    box-shadow: var(--shadow);
  }

  .topbar-left {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .topbar-title {
    font-size: 18px;
    font-weight: 700;
    color: var(--dark);
  }

  .topbar-subtitle {
    font-size: 13px;
    color: var(--gray);
    margin-top: 1px;
  }

  .topbar-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 9px 18px;
    border-radius: var(--radius-sm);
    font-size: 13.5px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: all .2s;
    text-decoration: none;
    white-space: nowrap;
  }

  .btn-primary {
    background: var(--primary);
    color: white;
  }

  .btn-primary:hover { background: var(--primary-dark); transform: translateY(-1px); box-shadow: var(--shadow-md); }

  .btn-outline {
    background: transparent;
    color: var(--gray);
    border: 1.5px solid var(--border);
  }

  .btn-outline:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-light); }

  .btn-success { background: var(--success); color: white; }
  .btn-success:hover { background: #059669; transform: translateY(-1px); box-shadow: var(--shadow-md); }

  .btn-danger { background: var(--danger); color: white; }
  .btn-danger:hover { background: #dc2626; }

  .btn-sm { padding: 6px 12px; font-size: 12px; }
  .btn-icon { padding: 9px; }

  /* ===== CONTENT ===== */
  .content {
    padding: 28px;
    flex: 1;
  }

  /* ===== VIEWS ===== */
  .view { display: none; }
  .view.active { display: block; }

  /* ===== STATS ===== */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 16px;
    margin-bottom: 28px;
  }

  .stat-card {
    background: var(--white);
    border-radius: var(--radius);
    padding: 20px;
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .stat-icon {
    width: 48px; height: 48px;
    border-radius: var(--radius-sm);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }

  .stat-icon.purple { background: var(--primary-light); color: var(--primary); }
  .stat-icon.blue { background: #e0f2fe; color: var(--secondary); }
  .stat-icon.green { background: #d1fae5; color: var(--success); }
  .stat-icon.orange { background: #fef3c7; color: var(--warning); }

  .stat-info .value { font-size: 26px; font-weight: 700; color: var(--dark); line-height: 1; }
  .stat-info .label { font-size: 12.5px; color: var(--gray); margin-top: 4px; }

  /* ===== TABLE ===== */
  .card {
    background: var(--white);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
    overflow: hidden;
  }

  .card-header {
    padding: 18px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }

  .card-title {
    font-size: 15px;
    font-weight: 700;
    color: var(--dark);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .card-title i { color: var(--primary); }

  .search-box {
    position: relative;
    flex: 1;
    max-width: 320px;
  }

  .search-box i {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--gray-light);
    font-size: 13px;
  }

  .search-box input {
    width: 100%;
    padding: 9px 12px 9px 36px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 13px;
    font-family: inherit;
    color: var(--dark);
    background: var(--bg);
    transition: border-color .2s;
    outline: none;
  }

  .search-box input:focus { border-color: var(--primary); background: white; }

  .filter-tabs {
    display: flex;
    gap: 4px;
    background: var(--bg);
    padding: 4px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
  }

  .filter-tab {
    padding: 6px 14px;
    border-radius: 4px;
    font-size: 12.5px;
    font-weight: 500;
    cursor: pointer;
    border: none;
    background: none;
    color: var(--gray);
    transition: all .2s;
    font-family: inherit;
  }

  .filter-tab.active { background: var(--white); color: var(--primary); font-weight: 600; box-shadow: var(--shadow); }

  .table-wrap { overflow-x: auto; }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  thead th {
    background: var(--bg);
    padding: 12px 16px;
    text-align: left;
    font-size: 11.5px;
    font-weight: 600;
    color: var(--gray);
    text-transform: uppercase;
    letter-spacing: .5px;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }

  tbody td {
    padding: 14px 16px;
    font-size: 13.5px;
    border-bottom: 1px solid var(--border);
    color: var(--dark);
    vertical-align: middle;
  }

  tbody tr:last-child td { border-bottom: none; }
  tbody tr:hover { background: #fafbff; }

  .post-thumb {
    width: 48px; height: 36px;
    border-radius: 6px;
    object-fit: cover;
    background: var(--bg);
    border: 1px solid var(--border);
    flex-shrink: 0;
  }

  .post-thumb-placeholder {
    width: 48px; height: 36px;
    border-radius: 6px;
    background: var(--primary-light);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--primary);
    font-size: 14px;
    flex-shrink: 0;
  }

  .post-title-cell {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .post-meta { flex: 1; min-width: 0; }
  .post-meta .title { font-weight: 600; font-size: 13.5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 280px; }
  .post-meta .slug { font-size: 11.5px; color: var(--gray-light); margin-top: 2px; font-family: monospace; }

  .badge-status {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 11.5px;
    font-weight: 600;
    white-space: nowrap;
  }

  .badge-status::before {
    content: '';
    width: 6px; height: 6px;
    border-radius: 50%;
    background: currentColor;
  }

  .badge-status.published { background: #d1fae5; color: #059669; }
  .badge-status.draft { background: #fef3c7; color: #d97706; }
  .badge-status.archived { background: #f1f5f9; color: var(--gray); }

  .badge-type {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px 9px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
  }

  .badge-type.post { background: #e0e7ff; color: var(--primary); }
  .badge-type.page { background: #e0f2fe; color: var(--secondary); }

  .action-btns { display: flex; gap: 6px; align-items: center; }

  .icon-btn {
    width: 32px; height: 32px;
    border-radius: var(--radius-sm);
    border: 1.5px solid var(--border);
    background: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    color: var(--gray);
    transition: all .2s;
  }

  .icon-btn:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-light); }
  .icon-btn.danger:hover { border-color: var(--danger); color: var(--danger); background: #fee2e2; }

  .empty-state {
    padding: 60px 24px;
    text-align: center;
  }

  .empty-state i { font-size: 48px; color: var(--border); margin-bottom: 16px; display: block; }
  .empty-state p { color: var(--gray); font-size: 14px; }

  /* ===== EDITOR VIEW ===== */
  .editor-layout {
    display: grid;
    grid-template-columns: 1fr 320px;
    gap: 24px;
    align-items: start;
  }

  .editor-main { display: flex; flex-direction: column; gap: 20px; }
  .editor-sidebar { display: flex; flex-direction: column; gap: 16px; }

  .form-card {
    background: var(--white);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
    overflow: hidden;
  }

  .form-card-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
    font-weight: 700;
    color: var(--dark);
  }

  .form-card-header i { color: var(--primary); font-size: 15px; }

  .form-card-body { padding: 20px; }

  .form-group { margin-bottom: 16px; }
  .form-group:last-child { margin-bottom: 0; }

  label {
    display: block;
    font-size: 12.5px;
    font-weight: 600;
    color: var(--dark-3);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: .4px;
  }

  label .required { color: var(--danger); margin-left: 2px; }
  label .optional { color: var(--gray-light); font-weight: 400; text-transform: none; letter-spacing: 0; font-size: 11px; margin-left: 4px; }

  input[type="text"],
  input[type="url"],
  textarea,
  select {
    width: 100%;
    padding: 10px 14px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 13.5px;
    font-family: inherit;
    color: var(--dark);
    background: var(--white);
    transition: border-color .2s, box-shadow .2s;
    outline: none;
    resize: vertical;
  }

  input:focus, textarea:focus, select:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(99,102,241,.1);
  }

  input::placeholder, textarea::placeholder { color: var(--gray-light); }

  .slug-input-wrap {
    display: flex;
    align-items: center;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    overflow: hidden;
    transition: border-color .2s, box-shadow .2s;
  }

  .slug-input-wrap:focus-within {
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(99,102,241,.1);
  }

  .slug-prefix {
    padding: 10px 12px;
    background: var(--bg);
    font-size: 12px;
    color: var(--gray);
    border-right: 1.5px solid var(--border);
    white-space: nowrap;
    font-family: monospace;
  }

  .slug-input-wrap input {
    border: none;
    border-radius: 0;
    padding: 10px 12px;
    flex: 1;
    font-family: monospace;
    font-size: 13px;
  }

  .slug-input-wrap input:focus { box-shadow: none; }

  .char-count {
    display: flex;
    justify-content: flex-end;
    font-size: 11px;
    color: var(--gray-light);
    margin-top: 4px;
  }

  .char-count.warn { color: var(--warning); }
  .char-count.over { color: var(--danger); }

  /* Quill customization */
  .ql-container {
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    border-radius: 0 0 var(--radius-sm) var(--radius-sm) !important;
    border-color: var(--border) !important;
    min-height: 320px;
  }

  .ql-toolbar {
    border-radius: var(--radius-sm) var(--radius-sm) 0 0 !important;
    border-color: var(--border) !important;
    background: var(--bg);
  }

  .ql-editor { min-height: 320px; line-height: 1.7; }
  .ql-editor p { margin-bottom: 8px; }

  /* Image Upload */
  .image-upload-area {
    border: 2px dashed var(--border);
    border-radius: var(--radius-sm);
    padding: 24px;
    text-align: center;
    cursor: pointer;
    transition: all .2s;
    position: relative;
    overflow: hidden;
  }

  .image-upload-area:hover { border-color: var(--primary); background: var(--primary-light); }
  .image-upload-area.has-image { border-style: solid; border-color: var(--success); padding: 0; }

  .image-upload-area input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%;
    padding: 0;
    border: none;
  }

  .upload-placeholder i { font-size: 32px; color: var(--gray-light); margin-bottom: 8px; display: block; }
  .upload-placeholder p { font-size: 13px; color: var(--gray); }
  .upload-placeholder span { font-size: 11.5px; color: var(--gray-light); }

  .image-preview {
    width: 100%;
    height: 160px;
    object-fit: cover;
    border-radius: var(--radius-sm);
    display: none;
  }

  .image-preview.show { display: block; }

  .image-actions {
    display: flex;
    gap: 8px;
    margin-top: 10px;
  }

  /* SEO Preview */
  .seo-preview {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 14px;
    margin-top: 14px;
  }

  .seo-preview-label {
    font-size: 10.5px;
    font-weight: 600;
    color: var(--gray);
    text-transform: uppercase;
    letter-spacing: .5px;
    margin-bottom: 10px;
  }

  .seo-preview-title {
    font-size: 17px;
    color: #1a0dab;
    font-family: Arial, sans-serif;
    line-height: 1.3;
    margin-bottom: 3px;
    cursor: pointer;
  }

  .seo-preview-url {
    font-size: 12px;
    color: #006621;
    font-family: Arial, sans-serif;
    margin-bottom: 4px;
  }

  .seo-preview-desc {
    font-size: 13px;
    color: #545454;
    font-family: Arial, sans-serif;
    line-height: 1.5;
  }

  /* Status select */
  .status-indicator {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 14px;
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 13.5px;
    color: var(--dark);
    cursor: pointer;
    transition: border-color .2s;
  }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .status-dot.published { background: var(--success); }
  .status-dot.draft { background: var(--warning); }
  .status-dot.archived { background: var(--gray-light); }

  /* Toast */
  .toast-container {
    position: fixed;
    bottom: 24px;
    right: 24px;
    z-index: 9999;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .toast {
    background: var(--dark);
    color: white;
    padding: 14px 18px;
    border-radius: var(--radius);
    box-shadow: var(--shadow-lg);
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13.5px;
    font-weight: 500;
    min-width: 280px;
    animation: slideIn .3s ease;
    border-left: 4px solid var(--primary);
  }

  .toast.success { border-left-color: var(--success); }
  .toast.error { border-left-color: var(--danger); }
  .toast.warning { border-left-color: var(--warning); }
  .toast i { font-size: 16px; }
  .toast.success i { color: var(--success); }
  .toast.error i { color: var(--danger); }
  .toast.warning i { color: var(--warning); }

  @keyframes slideIn {
    from { transform: translateX(100%); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
  }

  @keyframes fadeOut {
    from { opacity: 1; }
    to { opacity: 0; transform: translateY(10px); }
  }

  /* Modal */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.5);
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: center;

    font-size: 24px;
    color: var(--danger);

  .modal p { text-align: center; color: var(--gray); font-size: 14px; margin-bottom: 24px; }

  .modal-actions { display: flex; gap: 12px; justify-content: center; }
