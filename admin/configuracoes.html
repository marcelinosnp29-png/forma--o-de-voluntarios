<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Configurações - Admin Formação de Voluntários</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --primary: #2563eb;
    --primary-dark: #1d4ed8;
    --primary-light: #dbeafe;
    --secondary: #7c3aed;
    --success: #059669;
    --warning: #d97706;
    --danger: #dc2626;
    --sidebar-bg: #0f172a;
    --sidebar-text: #94a3b8;
    --sidebar-active: #2563eb;
    --bg: #f1f5f9;
    --card: #ffffff;
    --border: #e2e8f0;
    --text: #1e293b;
    --text-muted: #64748b;
    --radius: 12px;
    --shadow: 0 1px 3px rgba(0,0,0,.1), 0 1px 2px rgba(0,0,0,.06);
    --shadow-md: 0 4px 6px -1px rgba(0,0,0,.1), 0 2px 4px -1px rgba(0,0,0,.06);
    --shadow-lg: 0 10px 15px -3px rgba(0,0,0,.1), 0 4px 6px -2px rgba(0,0,0,.05);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    min-height: 100vh;
  }

  /* ── SIDEBAR ── */
  .sidebar {
    width: 260px;
    background: var(--sidebar-bg);
    display: flex;
    flex-direction: column;
    position: fixed;
    top: 0; left: 0;
    height: 100vh;
    z-index: 100;
    transition: transform .3s;
  }

  .sidebar-logo {
    padding: 24px 20px;
    border-bottom: 1px solid rgba(255,255,255,.08);
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .sidebar-logo .logo-icon {
    width: 40px; height: 40px;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
  }

  .sidebar-logo .logo-text {
    color: #f8fafc;
    font-size: 14px;
    font-weight: 700;
    line-height: 1.3;
  }

  .sidebar-logo .logo-sub {
    color: var(--sidebar-text);
    font-size: 11px;
    font-weight: 400;
  }

  .sidebar-nav {
    flex: 1;
    padding: 16px 12px;
    overflow-y: auto;
  }

  .nav-section {
    margin-bottom: 24px;
  }

  .nav-section-title {
    color: #475569;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 0 8px;
    margin-bottom: 8px;
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    border-radius: 8px;
    color: var(--sidebar-text);
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all .2s;
    margin-bottom: 2px;
    border: none;
    background: none;
    width: 100%;
    text-align: left;
  }

  .nav-item:hover {
    background: rgba(255,255,255,.06);
    color: #f8fafc;
  }

  .nav-item.active {
    background: rgba(37,99,235,.2);
    color: var(--primary);
  }

  .nav-item .nav-icon { font-size: 16px; width: 20px; text-align: center; }

  .sidebar-footer {
    padding: 16px;
    border-top: 1px solid rgba(255,255,255,.08);
  }

  .sidebar-footer .user-info {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .user-avatar {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: white;
    font-weight: 700;
    font-size: 14px;
  }

  .user-name { color: #f8fafc; font-size: 13px; font-weight: 600; }
  .user-role { color: var(--sidebar-text); font-size: 11px; }

  /* ── MAIN ── */
  .main {
    margin-left: 260px;
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  .topbar {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: 16px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 50;
    box-shadow: var(--shadow);
  }

  .topbar-left h1 {
    font-size: 20px;
    font-weight: 700;
    color: var(--text);
  }

  .topbar-left p {
    font-size: 13px;
    color: var(--text-muted);
    margin-top: 2px;
  }

  .topbar-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 20px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: all .2s;
    text-decoration: none;
  }

  .btn-primary {
    background: var(--primary);
    color: white;
  }

  .btn-primary:hover {
    background: var(--primary-dark);
    transform: translateY(-1px);
    box-shadow: var(--shadow-md);
  }

  .btn-outline {
    background: transparent;
    color: var(--text-muted);
    border: 1px solid var(--border);
  }

  .btn-outline:hover {
    background: var(--bg);
    color: var(--text);
  }

  .btn-success {
    background: var(--success);
    color: white;
  }

  .btn-success:hover {
    background: #047857;
    transform: translateY(-1px);
  }

  .btn-sm {
    padding: 7px 14px;
    font-size: 13px;
  }

  /* ── CONTENT ── */
  .content {
    padding: 32px;
    flex: 1;
  }

  /* ── TABS ── */
  .tabs-wrapper {
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
  }

  .tabs-header {
    display: flex;
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    scrollbar-width: none;
  }

  .tabs-header::-webkit-scrollbar { display: none; }

  .tab-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 16px 24px;
    font-size: 14px;
    font-weight: 600;
    color: var(--text-muted);
    cursor: pointer;
    border: none;
    background: none;
    border-bottom: 3px solid transparent;
    transition: all .2s;
    white-space: nowrap;
    position: relative;
  }

  .tab-btn:hover {
    color: var(--primary);
    background: var(--primary-light);
  }

  .tab-btn.active {
    color: var(--primary);
    border-bottom-color: var(--primary);
    background: var(--primary-light);
  }

  .tab-btn .tab-icon { font-size: 16px; }

  .tab-content {
    display: none;
    padding: 32px;
  }

  .tab-content.active { display: block; }

  /* ── FORM ELEMENTS ── */
  .form-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 24px;
  }

  .form-grid-3 {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 24px;
  }

  .form-full { grid-column: 1 / -1; }

  .form-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .form-label {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .form-label .badge {
    font-size: 10px;
    font-weight: 600;
    padding: 2px 6px;
    border-radius: 4px;
    background: var(--primary-light);
    color: var(--primary);
  }

  .form-input, .form-select, .form-textarea {
    padding: 10px 14px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-size: 14px;
    color: var(--text);
    background: var(--card);
    transition: all .2s;
    font-family: inherit;
    width: 100%;
  }

  .form-input:focus, .form-select:focus, .form-textarea:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(37,99,235,.1);
  }

  .form-textarea {
    resize: vertical;
    min-height: 100px;
  }

  .form-hint {
    font-size: 12px;
    color: var(--text-muted);
  }

  .form-input-group {
    display: flex;
    align-items: center;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    transition: all .2s;
  }

  .form-input-group:focus-within {
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(37,99,235,.1);
  }

  .input-prefix {
    padding: 10px 12px;
    background: var(--bg);
    color: var(--text-muted);
    font-size: 13px;
    font-weight: 500;
    border-right: 1.5px solid var(--border);
    white-space: nowrap;
  }

  .form-input-group .form-input {
    border: none;
    border-radius: 0;
    flex: 1;
  }

  .form-input-group .form-input:focus {
    box-shadow: none;
  }

  /* ── SECTION HEADER ── */
  .section-header {
    margin-bottom: 24px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }

  .section-header h3 {
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .section-header p {
    font-size: 13px;
    color: var(--text-muted);
    margin-top: 4px;
  }

  /* ── CARD ── */
  .card {
    background: var(--card);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    padding: 24px;
    box-shadow: var(--shadow);
  }

  .card + .card { margin-top: 24px; }

  .card-title {
    font-size: 14px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* ── TOGGLE ── */
  .toggle-group {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 0;
    border-bottom: 1px solid var(--border);
  }

  .toggle-group:last-child { border-bottom: none; }

  .toggle-info { flex: 1; }
  .toggle-label { font-size: 14px; font-weight: 600; color: var(--text); }
  .toggle-desc { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

  .toggle {
    position: relative;
    width: 44px;
    height: 24px;
    flex-shrink: 0;
  }

  .toggle input { opacity: 0; width: 0; height: 0; }

  .toggle-slider {
    position: absolute;
    inset: 0;
    background: #cbd5e1;
    border-radius: 24px;
    cursor: pointer;
    transition: .3s;
  }

  .toggle-slider::before {
    content: '';
    position: absolute;
    width: 18px; height: 18px;
    left: 3px; top: 3px;
    background: white;
    border-radius: 50%;
    transition: .3s;
    box-shadow: 0 1px 3px rgba(0,0,0,.2);
  }

  .toggle input:checked + .toggle-slider { background: var(--primary); }
  .toggle input:checked + .toggle-slider::before { transform: translateX(20px); }

  /* ── COLOR PICKER ── */
  .color-picker-group {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .color-swatch {
    width: 44px; height: 44px;
    border-radius: 8px;
    border: 2px solid var(--border);
    cursor: pointer;
    position: relative;
    overflow: hidden;
    flex-shrink: 0;
  }

  .color-swatch input[type="color"] {
    position: absolute;
    inset: -4px;
    width: calc(100% + 8px);
    height: calc(100% + 8px);
    border: none;
    cursor: pointer;
    opacity: 0;
  }

  .color-swatch-preview {
    position: absolute;
    inset: 0;
    border-radius: 6px;
  }

  .color-value {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-muted);
    font-family: monospace;
  }

  /* ── PREVIEW ── */
  .preview-box {
    border-radius: 12px;
    overflow: hidden;
    border: 2px solid var(--border);
    box-shadow: var(--shadow-md);
  }

  .preview-header {
    padding: 16px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    color: white;
  }

  .preview-logo {
    width: 36px; height: 36px;
    background: rgba(255,255,255,.2);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }

  .preview-site-name {
    font-size: 16px;
    font-weight: 700;
    color: white;
  }

  .preview-nav {
    display: flex;
    gap: 20px;
    margin-left: auto;
  }

  .preview-nav span {
    font-size: 13px;
    color: rgba(255,255,255,.8);
    cursor: pointer;
  }

  .preview-hero {
    padding: 48px 24px;
    text-align: center;
    background: linear-gradient(135deg, var(--preview-primary, #2563eb) 0%, var(--preview-secondary, #7c3aed) 100%);
    color: white;
  }

  .preview-hero h2 {
    font-size: 28px;
    font-weight: 800;
    margin-bottom: 12px;
  }

  .preview-hero p {
    font-size: 15px;
    opacity: .85;
    margin-bottom: 24px;
  }

  .preview-cta {
    display: inline-block;
    padding: 12px 28px;
    border-radius: 8px;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
    color: white;
  }

  .preview-body {
    padding: 24px;
    background: #f8fafc;
  }

  .preview-cards {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
  }

  .preview-card {
    background: white;
    border-radius: 8px;
    padding: 16px;
    border: 1px solid #e2e8f0;
  }

  .preview-card-icon {
    width: 32px; height: 32px;
    border-radius: 8px;
    margin-bottom: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
  }

  .preview-card h4 { font-size: 12px; font-weight: 700; color: #1e293b; }
  .preview-card p { font-size: 11px; color: #64748b; margin-top: 4px; }

  /* ── INTEGRATION CARD ── */
  .integration-card {
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 20px;
    display: flex;
    align-items: flex-start;
    gap: 16px;
    transition: all .2s;
  }

  .integration-card:hover {
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(37,99,235,.08);
  }

  .integration-icon {
    width: 48px; height: 48px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
  }

  .integration-body { flex: 1; }

  .integration-title {
    font-size: 14px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 4px;
  }

  .integration-desc {
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 12px;
    line-height: 1.5;
  }

  .integration-status {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 20px;
  }

  .status-active { background: #dcfce7; color: #166534; }
  .status-inactive { background: #fef3c7; color: #92400e; }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

  /* ── SOCIAL ICON ── */
  .social-row {
    display: grid;
    grid-template-columns: 48px 1fr;
    gap: 12px;
    align-items: center;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
  }

  .social-row:last-child { border-bottom: none; }

  .social-icon-box {
    width: 40px; height: 40px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }

  /* ── UPLOAD ── */
  .upload-area {
    border: 2px dashed var(--border);
    border-radius: 10px;
    padding: 32px;
    text-align: center;
    cursor: pointer;
    transition: all .2s;
    position: relative;
  }

  .upload-area:hover {
    border-color: var(--primary);
    background: var(--primary-light);
  }

  .upload-area input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
  }

  .upload-icon { font-size: 32px; margin-bottom: 8px; }
  .upload-text { font-size: 14px; font-weight: 600; color: var(--text); }
  .upload-hint { font-size: 12px; color: var(--text-muted); margin-top: 4px; }

  /* ── ALERT ── */
  .alert {
    padding: 12px 16px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 24px;
  }

  .alert-success { background: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }
  .alert-error { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }
  .alert-info { background: var(--primary-light); color: var(--primary-dark); border: 1px solid #bfdbfe; }

  /* ── LOADING ── */
  .loading-overlay {
    position: fixed;
    inset: 0;
    background: rgba(15,23,42,.5);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    backdrop-filter: blur(4px);
  }

  .loading-card {
    background: white;
    border-radius: 16px;
    padding: 32px 48px;
    text-align: center;
    box-shadow: var(--shadow-lg);
  }

  .spinner {
    width: 40px; height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--primary);
    border-radius: 50%;
    animation: spin .8s linear infinite;
    margin: 0 auto 16px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text { font-size: 14px; font-weight: 600; color: var(--text-muted); }

  /* ── TOAST ── */
  .toast-container {
    position: fixed;
    bottom: 24px;
    right: 24px;
    z-index: 9999;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .toast {
    background: white;
    border-radius: 10px;
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: var(--shadow-lg);
    border-left: 4px solid;
    min-width: 280px;
    animation: slideIn .3s ease;
    font-size: 14px;
    font-weight: 500;
  }

  .toast-success { border-color: var(--success); }
  .toast-error { border-color: var(--danger); }
  .toast-info { border-color: var(--primary); }

  @keyframes slideIn {
    from { transform: translateX(100%); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
  }

  .toast-icon { font-size: 18px; }
  .toast-msg { flex: 1; color: var(--text); }
  .toast-close {
    color: var(--text-muted);
    cursor: pointer;
    font-size: 16px;
    background: none;
    border: none;
    padding: 0;
  }

  /* ── DIVIDER ── */
  .divider {
    height: 1px;
    background: var(--border);
    margin: 24px 0;
  }

  /* ── CHAR COUNT ── */
  .char-count {
    font-size: 11px;
    color: var(--text-muted);
    text-align: right;
    margin-top: 4px;
  }

  .char-count.warn { color: var(--warning); }
  .char-count.danger { color: var(--danger); }

  /* ── RESPONSIVE ── */
  @media (max-width: 768px) {
    .sidebar { transform: translateX(-100%); }
    .sidebar.open { transform: translateX(0); }
    .main { margin-left: 0; }
    .content { padding: 16px; }
    .topbar { padding: 12px 16px; }
    .tab-content { padding: 20px 16px; }
    .preview-cards { grid-template-columns: 1fr; }
    .preview-nav { display: none; }
  }

  .hamburger {
    display: none;
    background: none;
    border: none;
    font-size: 22px;
    cursor: pointer;
    color: var(--text);
  }

  @media (max-width: 768px) { .hamburger { display: block; } }

  .sidebar-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.5);
    z-index: 99;
  }

  .sidebar-overlay.show { display: block; }
</style>
</head>
<body>

<!-- Sidebar Overlay (mobile) -->
<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

<!-- SIDEBAR -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <div class="logo-icon">🤝</div>
    <div>
      <div class="logo-text">Formação de<br>Voluntários</div>
      <div class="logo-sub">Painel Administrativo</div>
    </div>
  </div>

  <nav class="sidebar-nav">
    <div class="nav-section">
      <div class="nav-section-title">Principal</div>
      <a class="nav-item" href="#">
        <span class="nav-icon">📊</span> Dashboard
      </a>
      <a class="nav-item" href="#">
        <span class="nav-icon">👥</span> Voluntários
      </a>
      <a class="nav-item" href="#">
        <span class="nav-icon">📚</span> Cursos
      </a>
      <a class="nav-item" href="#">
        <span class="nav-icon">📅</span> Eventos
      </a>
    </div>

    <div class="nav-section">
      <div class="nav-section-title">Gestão</div>
