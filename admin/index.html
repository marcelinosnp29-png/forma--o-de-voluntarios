<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — Formação de Voluntários</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg-page:       #0f1117;
      --bg-card:       #1a1d27;
      --bg-input:      #12151f;
      --border:        #2a2d3e;
      --border-focus:  #2563eb;
      --accent:        #2563eb;
      --accent-hover:  #1d4ed8;
      --accent-active: #1e40af;
      --text-primary:  #f1f5f9;
      --text-secondary:#94a3b8;
      --text-label:    #cbd5e1;
      --error-bg:      #1f0a0a;
      --error-border:  #7f1d1d;
      --error-text:    #fca5a5;
      --success-bg:    #052e16;
      --success-border:#166534;
      --success-text:  #86efac;
      --radius:        12px;
      --radius-sm:     8px;
      --shadow:        0 25px 60px rgba(0,0,0,.6);
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background-color: var(--bg-page);
      color: var(--text-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
      background-image:
        radial-gradient(ellipse 80% 50% at 50% -10%, rgba(37,99,235,.18) 0%, transparent 70%),
        radial-gradient(ellipse 50% 40% at 80% 110%, rgba(37,99,235,.10) 0%, transparent 60%);
    }

    /* ── Card ── */
    .card {
      width: 100%;
      max-width: 420px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 44px 40px 40px;
      box-shadow: var(--shadow);
      animation: fadeUp .45s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0);    }
    }

    /* ── Header ── */
    .card-header {
      text-align: center;
      margin-bottom: 36px;
    }

    .logo-wrap {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, var(--accent), #3b82f6);
      border-radius: 16px;
      margin-bottom: 20px;
      box-shadow: 0 8px 24px rgba(37,99,235,.35);
    }

    .logo-wrap svg {
      width: 30px;
      height: 30px;
      fill: #fff;
    }

    .card-header h1 {
      font-size: 1.45rem;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -.3px;
      margin-bottom: 6px;
    }

    .card-header p {
      font-size: .875rem;
      color: var(--text-secondary);
    }

    /* ── Form ── */
    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: .8125rem;
      font-weight: 600;
      color: var(--text-label);
      margin-bottom: 8px;
      letter-spacing: .3px;
      text-transform: uppercase;
    }

    .input-wrap {
      position: relative;
    }

    .input-wrap svg {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      width: 17px;
      height: 17px;
      stroke: var(--text-secondary);
      pointer-events: none;
      transition: stroke .2s;
    }

    input[type="email"],
    input[type="password"],
    input[type="text"] {
      width: 100%;
      padding: 12px 14px 12px 42px;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-size: .9375rem;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
      -webkit-appearance: none;
    }

    input::placeholder {
      color: #3d4460;
    }

    input:focus {
      border-color: var(--border-focus);
      box-shadow: 0 0 0 3px rgba(37,99,235,.18);
    }

    input:focus + svg,
    .input-wrap:focus-within svg {
      stroke: var(--accent);
    }

    /* toggle senha */
    .toggle-pw {
      position: absolute;
      right: 13px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      transition: color .2s;
    }

    .toggle-pw:hover { color: var(--text-primary); }
    .toggle-pw svg { width: 18px; height: 18px; stroke: currentColor; fill: none; }

    /* ── Mensagens ── */
    .msg {
      display: none;
      align-items: flex-start;
      gap: 10px;
      padding: 12px 14px;
      border-radius: var(--radius-sm);
      font-size: .875rem;
      font-weight: 500;
      margin-bottom: 20px;
      line-height: 1.45;
      animation: fadeIn .25s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0);    }
    }

    .msg.show { display: flex; }

    .msg svg {
      flex-shrink: 0;
      width: 18px;
      height: 18px;
      margin-top: 1px;
    }

    #erro-login {
      background: var(--error-bg);
      border: 1px solid var(--error-border);
      color: var(--error-text);
    }

    #erro-login svg { stroke: var(--error-text); }

    #sucesso-login {
      background: var(--success-bg);
      border: 1px solid var(--success-border);
      color: var(--success-text);
    }

    #sucesso-login svg { stroke: var(--success-text); }

    /* ── Botão ── */
    .btn-entrar {
      width: 100%;
      padding: 13px;
      background: var(--accent);
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      letter-spacing: .3px;
      transition: background .18s, transform .12s, box-shadow .18s;
      box-shadow: 0 4px 16px rgba(37,99,235,.35);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      position: relative;
      overflow: hidden;
    }

    .btn-entrar:hover:not(:disabled) {
      background: var(--accent-hover);
      box-shadow: 0 6px 22px rgba(37,99,235,.45);
    }

    .btn-entrar:active:not(:disabled) {
      background: var(--accent-active);
      transform: scale(.98);
    }

    .btn-entrar:disabled {
      opacity: .65;
      cursor: not-allowed;
    }

    /* spinner */
    .spinner {
      display: none;
      width: 18px;
      height: 18px;
      border: 2.5px solid rgba(255,255,255,.35);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .btn-entrar.loading .btn-text { display: none; }
    .btn-entrar.loading .spinner  { display: block; }

    /* ── Footer ── */
    .card-footer {
      margin-top: 28px;
      text-align: center;
      font-size: .78rem;
      color: var(--text-secondary);
      border-top: 1px solid var(--border);
      padding-top: 20px;
    }

    .card-footer span {
      display: inline-block;
      width: 8px;
      height: 8px;
      background: #22c55e;
      border-radius: 50%;
      margin-right: 6px;
      box-shadow: 0 0 6px #22c55e;
      vertical-align: middle;
    }

    /* ── Responsive ── */
    @media (max-width: 460px) {
      .card { padding: 36px 24px 32px; }
    }
  </style>
</head>
<body>

  <div class="card" role="main">

    <!-- Header -->
    <div class="card-header">
      <div class="logo-wrap" aria-hidden="true">
        <!-- ícone: pessoa + estrela (voluntário) -->
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2a4 4 0 1 1 0 8 4 4 0 0 1 0-8zm0 10c4.42 0 8 1.79 8 4v2H4v-2c0-2.21 3.58-4 8-4z"/>
          <path d="M19 2l.94 2.06L22 5l-2.06.94L19 8l-.94-2.06L16 5l2.06-.94z" opacity=".85"/>
        </svg>
      </div>
      <h1>Painel Administrativo</h1>
      <p>Formação de Voluntários — Acesso restrito</p>
    </div>

    <!-- Mensagem de erro -->
    <div id="erro-login" class="msg" role="alert" aria-live="polite">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      <span id="erro-texto">Credenciais inválidas. Verifique e tente novamente.</span>
    </div>

    <!-- Mensagem de sucesso -->
    <div id="sucesso-login" class="msg" role="status" aria-live="polite">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>
      </svg>
      <span>Login realizado! Redirecionando…</span>
    </div>

    <!-- Formulário -->
    <form id="form-login" novalidate>

      <div class="form-group">
        <label for="email">E-mail</label>
        <div class="input-wrap">
          <input
            type="email"
            id="email"
            name="email"
            placeholder="admin@exemplo.com"
            autocomplete="username"
            required
          />
          <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <rect x="2" y="4" width="20" height="16" rx="2"/>
            <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
          </svg>
        </div>
      </div>

      <div class="form-group">
        <label for="senha">Senha</label>
        <div class="input-wrap">
          <input
            type="password"
            id="senha"
            name="senha"
            placeholder="••••••••"
            autocomplete="current-password"
            required
          />
          <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <button type="button" class="toggle-pw" id="toggle-pw" aria-label="Mostrar/ocultar senha" tabindex="0">
            <svg id="icon-eye" viewBox="0 0 24 24" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <button type="submit" class="btn-entrar" id="btn-entrar">
        <span class="btn-text">Entrar</span>
        <div class="spinner" aria-hidden="true"></div>
      </button>

    </form>

    <!-- Footer -->
    <div class="card-footer">
      <span aria-hidden="true"></span>Sistema seguro · Apenas administradores autorizados
    </div>

  </div>

  <!-- ══════════════════════════════════════════
       SUPABASE + LÓGICA DE LOGIN
  ══════════════════════════════════════════ -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    /* ── Configuração ── */
    const SUPABASE_URL = 'COLE_SUA_URL';
    const SUPABASE_KEY = 'COLE_SUA_CHAVE';

    const { createClient } = supabase;
    const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

    /* ── Elementos ── */
    const form        = document.getElementById('form-login');
    const emailInput  = document.getElementById('email');
    const senhaInput  = document.getElementById('senha');
    const btnEntrar   = document.getElementById('btn-entrar');
    const erroBox     = document.getElementById('erro-login');
    const erroTexto   = document.getElementById('erro-texto');
    const sucessoBox  = document.getElementById('sucesso-login');
    const togglePw    = document.getElementById('toggle-pw');

    /* ── Helpers ── */
    function showErro(msg) {
      erroTexto.textContent = msg;
      erroBox.classList.add('show');
      sucessoBox.classList.remove('show');
    }

    function hideErro() {
      erroBox.classList.remove('show');
    }

    function setLoading(on) {
      btnEntrar.disabled = on;
      btnEntrar.classList.toggle('loading', on);
    }

    /* ── Toggle senha ── */
    togglePw.addEventListener('click', () => {
      const isText = senhaInput.type === 'text';
      senhaInput.type = isText ? 'password' : 'text';
      togglePw.setAttribute('aria-label', isText ? 'Mostrar senha' : 'Ocultar senha');
      document.getElementById('icon-eye').innerHTML = isText
        ? /* olho fechado */
          `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
           <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
           <line x1="1" y1="1" x2="23" y2="23"/>`
        : /* olho aberto */
          `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
    });

    /* ── Verificar sessão existente ── */
    (async () => {
      try {
        const { data: { session } } = await sb.auth.getSession();
        if (session) {
          window.location.replace('dashboard.html');
        }
      } catch (e) {
        /* ignora erros de rede no check inicial */
      }
    })();

    /* ── Submit ── */
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideErro();

      const email = emailInput.value.trim();
      const senha = senhaInput.value;

      /* validação básica client-side */
      if (!email || !senha) {
        showErro('Preencha o e-mail e a senha para continuar.');
        return;
      }

      setLoading(true);

      try {
        const { data, error } = await sb.auth.signInWithPassword({
          email,
          password: senha,
        });

        if (error) {
          /* mensagens amigáveis por código/mensagem */
          let msg = 'Credenciais inválidas. Verifique e tente novamente.';
          if (error.message) {
            const m = error.message.toLowerCase();
            if (m.includes('invalid login') || m.includes('invalid credentials')) {
              msg = 'E-mail ou senha incorretos. Tente novamente.';
            } else if (m.includes('email not confirmed')) {
              msg = 'Confirme seu e-mail antes de acessar o painel.';
            } else if (m.includes('too many requests') || m.includes('rate limit')) {
              msg = 'Muitas tentativas. Aguarde alguns minutos e tente novamente.';
            } else if (m.includes('network') || m.includes('fetch')) {
              msg = 'Erro de conexão. Verifique sua internet e tente novamente.';
            }
          }
          showErro(msg);
          setLoading(false);
          return;
        }

        /* sucesso */
        sucessoBox.classList.add('show');
        hideErro();

        setTimeout(() => {
          window.location.replace('dashboard.html');
        }, 900);

      } catch (err) {
        showErro('Ocorreu um erro inesperado. Tente novamente.');
        setLoading(false);
      }
    });

    /* esconder erro ao digitar */
    [emailInput, senhaInput].forEach(el => {
      el.addEventListener('input', hideErro);
    });
  </script>
</body>
</html>
